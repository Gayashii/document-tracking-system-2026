@if (!submitted()) {
  <h5 class="fw-bold mb-1">Forgot Password</h5>
  <p class="text-muted small mb-4">Enter your email and we'll send a reset link.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="mb-4">
      <label class="form-label fw-semibold" for="fpEmail">Email Address</label>
      <input id="fpEmail" type="email" class="form-control" formControlName="email"
        placeholder="you@example.com" autocomplete="email"
        [class.is-invalid]="email.invalid && email.touched" />
      @if (email.invalid && email.touched) {
        <div class="invalid-feedback">Enter a valid email address.</div>
      }
    </div>
    <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2"
      [disabled]="submitting()">
      @if (submitting()) { <app-spinner size="sm" /> }
      Send Reset Link
    </button>
  </form>
} @else {
  <div class="text-center py-3">
    <div class="mb-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="text-success" viewBox="0 0 16 16">
        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
      </svg>
    </div>
    <h6 class="fw-bold">Check your inbox</h6>
    <p class="text-muted small">We've sent a password reset link to <strong>{{ email.value }}</strong>.</p>
  </div>
}

<hr class="my-4" />
<p class="text-center small mb-0">
  <a routerLink="/login" class="text-decoration-none fw-semibold">Back to Sign In</a>
</p>
