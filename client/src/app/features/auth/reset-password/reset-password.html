<h5 class="fw-bold mb-1">Reset Password</h5>
<p class="text-muted small mb-4">Enter your new password below.</p>

<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="mb-3">
    <label class="form-label fw-semibold" for="newPassword">New Password</label>
    <input id="newPassword" type="password" class="form-control" formControlName="password"
      placeholder="Min 8 characters" autocomplete="new-password"
      [class.is-invalid]="password.invalid && password.touched" />
    @if (password.invalid && password.touched) {
      <div class="invalid-feedback">Password must be at least 8 characters.</div>
    }
  </div>

  <div class="mb-4">
    <label class="form-label fw-semibold" for="rpConfirm">Confirm New Password</label>
    <input id="rpConfirm" type="password" class="form-control" formControlName="confirmPassword"
      placeholder="Repeat password" autocomplete="new-password"
      [class.is-invalid]="(confirmPassword.invalid || form.errors?.['passwordMismatch']) && confirmPassword.touched" />
    @if (form.errors?.['passwordMismatch'] && confirmPassword.touched) {
      <div class="invalid-feedback d-block">Passwords do not match.</div>
    }
  </div>

  <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2"
    [disabled]="submitting()">
    @if (submitting()) { <app-spinner size="sm" /> }
    Reset Password
  </button>
</form>

<hr class="my-4" />
<p class="text-center small mb-0">
  <a routerLink="/login" class="text-decoration-none fw-semibold">Back to Sign In</a>
</p>
