<div class="drop-zone" [class.drag-over]="dragOver()">
  @if (!selectedFile()) {
    <label for="fileInput" class="d-block cursor-pointer mb-0 w-100">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="text-muted mb-2" viewBox="0 0 16 16">
        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
        <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
      </svg>
      <p class="text-muted mb-1">Drag &amp; drop or <span class="text-primary text-decoration-underline">browse</span></p>
      <small class="text-muted">PDF, JPEG, PNG — max 10 MB</small>
    </label>
    <input id="fileInput" type="file" class="d-none" accept=".pdf,.jpg,.jpeg,.png"
      (change)="onFileInput($event)" />
  } @else {
    <div class="d-flex align-items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="text-primary flex-shrink-0" viewBox="0 0 16 16">
        <path d="M4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm0 1h8a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1"/>
      </svg>
      <div class="text-start overflow-hidden">
        <div class="small fw-semibold text-truncate">{{ selectedFile()!.name }}</div>
        <small class="text-muted">{{ formatSize(selectedFile()!.size) }}</small>
      </div>
      <button type="button" class="btn btn-sm btn-outline-danger ms-auto" (click)="clear()">Remove</button>
    </div>
  }
</div>
@if (error()) {
  <div class="text-danger small mt-1">{{ error() }}</div>
}
